name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint --strict
