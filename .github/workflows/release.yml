name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Package app
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/package-app.sh "$VERSION"
          cd .build/package
          zip -r -y "TrainTracker-$VERSION.app.zip" TrainTracker.app
          mv "TrainTracker-$VERSION.app.zip" "$GITHUB_WORKSPACE/"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "archive=TrainTracker-$VERSION.app.zip" >> "$GITHUB_OUTPUT"

      - name: Compute checksum
        id: sha
        run: echo "sha256=$(shasum -a 256 "${{ steps.package.outputs.archive }}" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ${{ steps.package.outputs.archive }}

      - name: Checkout homebrew-tap
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask
        env:
          VERSION: ${{ steps.package.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          python3 << 'EOF'
          import os, re

          version = os.environ['VERSION']
          sha256  = os.environ['SHA256']

          path = 'homebrew-tap/Casks/traintracker.rb'
          text = open(path).read()
          text = re.sub(r'version "[^"]*"', f'version "{version}"', text)
          text = re.sub(r'sha256 "[^"]*"', f'sha256 "{sha256}"', text)
          open(path, 'w').write(text)
          print(f"Updated cask to v{version}")
          EOF

      - name: Commit and push cask update
        working-directory: homebrew-tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/traintracker.rb
          git diff --staged --quiet || git commit -m "traintracker ${{ github.ref_name }}"
          git push
